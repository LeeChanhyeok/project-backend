spring:
  datasource:
    url: jdbc:h2:mem:sampledb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true          # http://localhost:8080/h2-console 접속 가능

  jpa:
    hibernate:
      ddl-auto: create-drop  # 개발용 (운영: validate or none)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

